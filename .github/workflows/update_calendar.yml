name: Update World Cup Calendar

on:
  schedule:
    # Every 90 minutes: runs at :00 on even triplets and :30 on odd triplets
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process calendar
        run: python process_calendar.py

      - name: Commit and push if changed
        run: |
          git diff --quiet calendar.ics 2>/dev/null || {
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add calendar.ics
            git commit -m "chore: update calendar $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          }
